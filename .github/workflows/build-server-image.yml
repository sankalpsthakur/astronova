name: Build & publish server image to GHCR

# Builds server/Dockerfile and publishes to ghcr.io/sankalpsthakur/astronova-server.
# Reason: Render's Docker build step still consumes free-tier pipeline minutes,
# which are exhausted. We move the build into GitHub Actions and have Render
# pull a pre-built image. The companion Render service `astronova-ghcr` pulls
# `ghcr.io/sankalpsthakur/astronova-server:latest`.

on:
  push:
    branches:
      - main
      - 'infra/**'
    paths:
      - 'server/**'
      - '.github/workflows/build-server-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-server-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/sankalpsthakur/astronova-server
    steps:
      - uses: actions/checkout@v4

      - name: Set image tags
        id: tags
        run: |
          short_sha=$(git rev-parse --short=12 HEAD)
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:latest"
            echo "${IMAGE}:${short_sha}"
            echo "${IMAGE}:${GITHUB_REF_NAME//\//-}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/sankalpsthakur/astronova
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Summary
        run: |
          {
            echo "## Pushed image"
            echo ""
            echo "- \`${IMAGE}:latest\`"
            echo "- \`${IMAGE}:${{ steps.tags.outputs.short_sha }}\`"
            echo ""
            echo "Render service \`astronova-ghcr\` pulls \`${IMAGE}:latest\` on deploy."
          } >> "$GITHUB_STEP_SUMMARY"
