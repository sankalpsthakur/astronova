name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read
  pull-requests: read

jobs:
  python-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r server/requirements.txt
        pip install pytest pytest-cov flake8
    
    - name: Lint with flake8
      run: |
        flake8 server --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 server --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Security scan handoff
      run: |
        echo "::notice::Dependency security scanning runs in the Test Suite workflow via Trivy and non-blocking Safety/Bandit reports."
    
    - name: Test with pytest
      run: |
        cd server && SECRET_KEY=test_secret_key python -m pytest tests/ -v --cov=. --cov-report=xml --cov-fail-under=0
      env:
        SECRET_KEY: test_secret_key
        ASTRONOVA_DISABLE_RATE_LIMITS: "1"
    
    - name: Python syntax check
      run: python -m py_compile $(find server -name "*.py")
    
    - name: CloudKit ERD Test
      run: |
        if [ -f server/test_cloudkit_ci.py ]; then
          cd server && SECRET_KEY=test_secret_key python test_cloudkit_ci.py
        else
          echo "::warning::server/test_cloudkit_ci.py is not present; skipping optional CloudKit ERD structure check"
        fi
      env:
        SECRET_KEY: test_secret_key
        # CloudKit CI test validates code structure without requiring live CloudKit connection

  swift-ios:
    runs-on: macos-14
    defaults:
      run:
        working-directory: client

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode version
      run: |
        sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
        xcodebuild -version

    - name: Build iOS app
      run: |
        xcodebuild -project astronova.xcodeproj -scheme AstronovaApp \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          ONLY_ACTIVE_ARCH=NO \
          build

  cloudkit-integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'  # Manual trigger only
    strategy:
      matrix:
        python-version: [3.11]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r server/requirements.txt
    
    - name: CloudKit Full Integration Test
      run: |
        cd server && SECRET_KEY=test_secret_key python test_cloudkit_erd_complete.py
      env:
        SECRET_KEY: test_secret_key
        # Note: This test will show INTERNAL_ERROR until CloudKit schema is created
        # The test validates that authentication and CRUD operations are properly implemented

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Skip when GitHub Dependency graph is disabled
      if: vars.DEPENDENCY_REVIEW_ENABLED != 'true'
      run: |
        echo "::notice::Dependency review skipped. Enable GitHub Dependency graph and set repository variable DEPENDENCY_REVIEW_ENABLED=true to turn this gate on."
    - name: Checkout Repository
      if: vars.DEPENDENCY_REVIEW_ENABLED == 'true'
      uses: actions/checkout@v4
    - name: Dependency Review
      if: vars.DEPENDENCY_REVIEW_ENABLED == 'true'
      uses: actions/dependency-review-action@v4
